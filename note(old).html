<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Note ❤️</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #ffc1cc, #ee9ca7);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #333;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .note-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.85) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            margin-bottom: 20px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 140px;
            text-align: left;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background: #333;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .buttons {
            margin-top: 25px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .buttons.show {
            opacity: 1;
        }

        .yes-btn, .no-btn {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .yes-btn {
            background-color: #28a745;
            color: white;
            animation: heartbeat 1.6s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(40,167,69,0.6);
        }

        .no-btn {
            background-color: #dc3545;
            color: white;
            position: relative;
        }

        /* Confetti hearts burst */
        .confetti-piece {
            position: fixed;
            top: 50%;
            left: 50%;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 10;
            opacity: 1;
            animation: burst 1.4s ease-out forwards;
        }

        @keyframes burst {
            to {
                transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
                opacity: 0;
            }
        }

        .yes-message {
            margin-top: 20px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #28a745;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

<body>

    <div class="note-box">
        <h1>For My Queen ❤️</h1>

        <p id="noteText"></p>

        <div class="buttons" id="buttons">
            <button class="yes-btn" onclick="yesClicked()">Yes ❤️</button>
            <button class="no-btn" onmouseover="moveButton()">No</button>
        </div>

        <div id="yesMessage" class="yes-message"></div>
    </div>

<script>
    const fullText = "You mean a world to me my babbudi, I'm sorry if i have hurt you in any way, even you know how much i love you. I want you to be forever with me, and i want to make you the happiest person in the world. I love you so much my love, and i will always be there for you no matter what. Do you want to be with me forever my love? 💖";

    const textEl = document.getElementById('noteText');
    const buttonsEl = document.getElementById('buttons');
    let i = 0;

    function typeWriter() {
        if (i < fullText.length) {
            textEl.textContent = fullText.slice(0, i + 1);
            i++;
            setTimeout(typeWriter, 25);
        } else {
            buttonsEl.classList.add('show');
        }
    }

    window.addEventListener('load', () => {
        setTimeout(typeWriter, 400);
    });

    function yesClicked() {
        burstHearts();
        const msg = document.getElementById('yesMessage');
        msg.textContent = "I am the happiest person in the world my love, i am so grateful to have you in my life. I love you so much ❤️";
    }

    function burstHearts() {
        const symbols = ['❤️', '💕', '💖', '💗', '✨'];
        for (let n = 0; n < 40; n++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            const angle = Math.random() * Math.PI * 2;
            const distance = 150 + Math.random() * 250;
            piece.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            piece.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            piece.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
            piece.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
            document.body.appendChild(piece);
            setTimeout(() => piece.remove(), 1500);
        }
    }

    function moveButton() {
        const button = document.querySelector(".no-btn");
        const maxX = window.innerWidth - button.offsetWidth;
        const maxY = window.innerHeight - button.offsetHeight;
        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;
        button.style.position = "fixed";
        button.style.left = randomX + "px";
        button.style.top = randomY + "px";
    }
</script>
</body>
</html>
